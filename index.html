<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SM_art — Art by Sophia</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=DM+Sans:wght@300;400;500&family=Pacifico&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --cream: oklch(97% 0.012 55);
    --cream-mid: oklch(93% 0.018 55);
    --cobalt: oklch(38% 0.18 262);
    --cobalt-light: oklch(52% 0.18 262);
    --gold: oklch(74% 0.14 76);
    --gold-dark: oklch(58% 0.14 76);
    --pink: oklch(65% 0.24 350);
    --pink-light: oklch(72% 0.22 350);
    --ink: oklch(18% 0.02 260);
    --ink-mid: oklch(45% 0.02 260);
    --ink-light: oklch(72% 0.015 260);
    --serif: 'Playfair Display', Georgia, serif;
    --sans: 'DM Sans', sans-serif;
    --script: 'Pacifico', cursive;
  }
  html { scroll-behavior: smooth; }
  body {
    background: var(--cream);
    color: var(--ink);
    font-family: var(--sans);
    overflow-x: hidden;
  }
  #root { min-height: 100vh; }

  /* Tweaks panel */
  #tweaks-panel {
    display: none;
    position: fixed;
    bottom: 24px; right: 24px;
    background: white;
    border: 1px solid #e0d8cf;
    border-radius: 14px;
    padding: 22px;
    width: 320px;
    z-index: 9999;
    box-shadow: 0 16px 48px rgba(0,0,0,0.18);
    font-family: var(--sans);
    font-size: 13px;
    max-height: 88vh;
    overflow-y: auto;
  }
  #tweaks-panel.open { display: block; }
  #tweaks-panel h3 { font-family: var(--serif); font-size: 18px; margin-bottom: 4px; color: var(--ink); font-weight: 700; }
  .tw-sub { color: var(--ink-mid); font-size: 10px; letter-spacing: 0.05em; text-transform: uppercase; margin-bottom: 18px; }
  .tw-section { margin-bottom: 18px; padding-bottom: 14px; border-bottom: 1px solid oklch(94% 0.01 60); }
  .tw-section:last-child { border-bottom: none; padding-bottom: 0; margin-bottom: 0; }
  .tw-section-title { font-family: var(--serif); font-style: italic; font-size: 13px; color: var(--cobalt); margin-bottom: 10px; font-weight: 700; }
  #tweaks-panel label { display: block; margin-top: 12px; margin-bottom: 6px; color: var(--ink); font-size: 10px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; }
  .tw-section > label:first-of-type { margin-top: 0; }
  #tweaks-panel select { width: 100%; padding: 8px 10px; border: 1px solid #ddd; border-radius: 6px; background: white; font-family: var(--sans); font-size: 13px; cursor: pointer; }
  .swatch-row { display: flex; gap: 8px; flex-wrap: wrap; }
  .swatch { width: 30px; height: 30px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; transition: transform .18s; position: relative; }
  .swatch:hover { transform: scale(1.12); }
  .swatch.active { border-color: var(--ink); box-shadow: 0 0 0 2px white inset; }
  .tw-toggle-row { display: flex !important; align-items: center; gap: 10px; text-transform: none !important; font-size: 12px !important; font-weight: 500 !important; letter-spacing: 0 !important; cursor: pointer; margin-top: 8px !important; }
  .tw-toggle-row input { width: auto !important; margin: 0 !important; }
  .tweak-row { display: flex; gap: 8px; margin-bottom: 14px; }
  .tweak-swatch { width: 28px; height: 28px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; transition: border-color .2s; }
  .tweak-swatch.active { border-color: var(--ink); }

  @keyframes fadeUp { from { opacity:0; transform: translateY(28px); } to { opacity:1; transform:translateY(0); } }
  @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
  @keyframes marquee { from { transform: translateX(0); } to { transform: translateX(-50%); } }
  @keyframes paintIn { from { clip-path: inset(0 100% 0 0); } to { clip-path: inset(0 0% 0 0); } }
  @keyframes float { 0%,100%{transform:translateY(0) rotate(-1deg)} 50%{transform:translateY(-12px) rotate(1deg)} }

  .cursor{position:fixed;width:10px;height:10px;background:#f0187a;border-radius:50%;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);}
  .cursor-ring{position:fixed;width:34px;height:34px;border:1.5px solid #1a8fe3;border-radius:50%;pointer-events:none;z-index:9998;transform:translate(-50%,-50%);transition:all 0.16s ease;}
  @media(max-width:768px){.cursor,.cursor-ring{display:none;}}
</style>
</head>
<body style="cursor:none;">
<div class="cursor" id="cur"></div>
<div class="cursor-ring" id="curR"></div>
<div id="root"></div>

<div id="tweaks-panel">
  <h3>Tweaks</h3>
  <div class="tw-sub">Live design controls — every change saves</div>

  <div class="tw-section">
    <div class="tw-section-title">Content</div>
    <label>Hero Artwork</label>
    <select id="tw-hero">
      <option value="Bird Lady">Bird Lady</option>
      <option value="Cheetah">Cheetah</option>
      <option value="Scarf Lady">Scarf Lady</option>
      <option value="Zebra">Zebra</option>
      <option value="Pink Giraffe">Pink Giraffe</option>
      <option value="Popcorn Lady">Popcorn Lady</option>
    </select>
    <label>Site Theme</label>
    <select id="tw-theme">
      <option value="cream">Warm Cream</option>
      <option value="dark">Dark Gallery</option>
    </select>
    <label>Hero Layout</label>
    <select id="tw-layout">
      <option value="split">Split (art + text)</option>
      <option value="fullbleed">Full-bleed art</option>
      <option value="centered">Centered editorial</option>
    </select>
  </div>

  <div class="tw-section">
    <div class="tw-section-title">Colour Vibe</div>
    <label>Preset Palette</label>
    <div class="swatch-row" id="tw-palette"></div>
    <label>Accent Colour</label>
    <div class="swatch-row" id="tw-accent"></div>
    <label>Marquee Strip</label>
    <div class="swatch-row" id="tw-marquee"></div>
  </div>

  <div class="tw-section">
    <div class="tw-section-title">Brightness</div>
    <label class="tw-toggle-row"><input type="checkbox" id="tw-bold" /> Bolder & brighter mode</label>
    <label class="tw-toggle-row"><input type="checkbox" id="tw-showMarquee" checked /> Show marquee strip</label>
  </div>
</div>

<script type="text/babel">
const { useState, useEffect, useRef } = React;

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "heroArt": "Scarf Lady",
  "theme": "dark",
  "layout": "fullbleed",
  "palette": "signature",
  "accent": "pink",
  "marquee": "pink",
  "bold": true,
  "showMarquee": true
}/*EDITMODE-END*/;

// Brighter / bolder colour system inspired by the new logo (paint-splash energy)
const ACCENTS = {
  pink:    { color: '#f0187a', light: '#ff4099', label: 'Hot Pink' },
  magenta: { color: '#c026d3', light: '#d946ef', label: 'Magenta' },
  cobalt:  { color: '#1a8fe3', light: '#3aa0e6', label: 'Cobalt' },
  emerald: { color: '#0ea968', light: '#10c073', label: 'Emerald' },
  tangerine:{color: '#f97316', light: '#fb923c', label: 'Tangerine' },
  gold:    { color: '#e8c840', light: '#f0d660', label: 'Gold' },
  violet:  { color: '#7c3aed', light: '#9460f0', label: 'Violet' },
};

// Marquee strip colour options
const MARQUEE_COLOURS = {
  pink:    '#f0187a',
  cobalt:  '#1a8fe3',
  magenta: '#c026d3',
  tangerine:'#f97316',
  emerald: '#0ea968',
  gold:    '#e8c840',
  ink:     '#0c0c14',
};

// Palette presets — drive multiple accents at once
const PALETTES = {
  signature: { accent: 'pink',    marquee: 'pink',    label: 'Signature',  preview: ['#f0187a','#1a8fe3','#e8c840'] },
  paintsplash:{accent: 'magenta', marquee: 'cobalt',  label: 'Paint Splash',preview: ['#c026d3','#1a8fe3','#f97316'] },
  sunset:    { accent: 'tangerine',marquee: 'pink',   label: 'Sunset',     preview: ['#f97316','#f0187a','#e8c840'] },
  ocean:     { accent: 'cobalt',  marquee: 'emerald', label: 'Ocean',      preview: ['#1a8fe3','#0ea968','#7c3aed'] },
  electric:  { accent: 'violet',  marquee: 'magenta', label: 'Electric',   preview: ['#7c3aed','#c026d3','#1a8fe3'] },
};

const ARTWORKS = [
  { id: 1, title: "Bird Lady", file: "images/Bluebird_Lady.jpg", category: "Portrait", year: 2024 },
  { id: 2, title: "Cheetah", file: "images/Cheetah.jpg", category: "Wildlife", year: 2024 },
  { id: 3, title: "Zebra", file: "images/zebra.jpg", category: "Wildlife", year: 2024 },
  { id: 4, title: "Scarf Lady", file: "images/Boss_Lady.jpg", category: "Portrait", year: 2025 },
  { id: 5, title: "Pink Giraffe", file: "images/Pink_Giraffe.jpg", category: "Wildlife", year: 2025 },
  { id: 6, title: "Popcorn Lady", file: "images/Popcorn_Lady.jpg", category: "Portrait", year: 2025 },
];

const PRODUCTS = [
  { name: "Wall Calendars", desc: "Annual A3 calendars — the perfect corporate Christmas gift", img: "images/market_stall.jpg", tag: "Corporate favourite" },
  { name: "Greeting Cards", desc: "Every occasion, painted with joy", img: "images/market2.jpg", tag: "From R25" },
  { name: "Bookmarks & Magnets", desc: "Pocket-sized pieces of original art", img: "images/In_Bloom_Series.jpg", tag: "Stocking fillers" },
  { name: "Placemats", desc: "Seasonal sets — Christmas & Easter", img: "images/easter_bunny_flowers.jpg", tag: "Limited edition" },
];

function Nav({ tweaks }) {
  const [scrolled, setScrolled] = useState(false);
  useEffect(() => {
    const h = () => setScrolled(window.scrollY > 40);
    window.addEventListener('scroll', h);
    return () => window.removeEventListener('scroll', h);
  }, []);

  const bg = tweaks.theme === 'dark'
    ? scrolled ? 'rgba(12,12,18,0.96)' : 'transparent'
    : scrolled ? 'rgba(253,250,246,0.96)' : 'transparent';
  const col = tweaks.theme === 'dark' ? '#f5f0e8' : 'var(--ink)';

  return (
    <nav style={{
      position: 'fixed', top: 0, left: 0, right: 0, zIndex: 100,
      display: 'flex', alignItems: 'center', justifyContent: 'space-between',
      padding: '12px 40px',
      background: bg,
      backdropFilter: scrolled ? 'blur(12px)' : 'none',
      borderBottom: scrolled ? '1px solid rgba(0,0,0,0.06)' : 'none',
      transition: 'all 0.4s ease',
    }}>
      {/* Wordmark — top-left */}
      <a href="#" style={{ display: 'flex', flexDirection: 'column', alignItems: 'flex-start', textDecoration: 'none', flexShrink: 0, lineHeight: 1 }}>
        <span style={{
          fontFamily: 'var(--script)', fontSize: 36, fontWeight: 400,
          color: scrolled ? 'var(--ink)' : 'white',
          letterSpacing: '0', lineHeight: 1,
          textShadow: scrolled ? 'none' : '0 2px 10px rgba(0,0,0,0.4)',
          transition: 'color 0.3s',
        }}>SM_art</span>
        <span style={{
          fontFamily: 'var(--sans)', fontSize: 9, fontWeight: 500,
          color: scrolled ? 'var(--ink-mid)' : 'rgba(255,255,255,0.85)',
          letterSpacing: '0.28em', textTransform: 'uppercase',
          marginTop: 4, paddingLeft: 2, whiteSpace: 'nowrap',
          textShadow: scrolled ? 'none' : '0 1px 4px rgba(0,0,0,0.4)',
          transition: 'color 0.3s',
        }}>Art by Sophia</span>
      </a>

      {/* Nav links + Shop Now — top-right */}
      <div style={{ display: 'flex', gap: 32, fontFamily: 'var(--sans)', fontSize: 13, fontWeight: 500, letterSpacing: '0.08em', textTransform: 'uppercase', color: col, alignItems: 'center' }}>
        {['Gallery','Shop',"Sophia's Story",'Corporate','Contact'].map(n => (
          <a key={n} href="#" style={{
            color: 'inherit', textDecoration: 'none', opacity: 0.85, transition: 'opacity .2s',
            textShadow: scrolled ? 'none' : '0 1px 8px rgba(0,0,0,0.4)',
          }}
            onMouseEnter={e => e.target.style.opacity=1}
            onMouseLeave={e => e.target.style.opacity=0.85}>{n}</a>
        ))}
        <a href="#shop" style={{
          background: 'var(--accent, var(--pink))', color: 'white', padding: '12px 26px',
          borderRadius: 2, fontFamily: 'var(--sans)', fontSize: 12, fontWeight: 600,
          letterSpacing: '0.12em', textTransform: 'uppercase', textDecoration: 'none',
          transition: 'all .2s',
          boxShadow: '0 4px 20px rgba(240,24,122,0.35)',
        }}
          onMouseEnter={e => { e.target.style.transform='translateY(-1px)'; e.target.style.boxShadow='0 6px 24px rgba(240,24,122,0.5)'; }}
          onMouseLeave={e => { e.target.style.transform='translateY(0)'; e.target.style.boxShadow='0 4px 20px rgba(240,24,122,0.35)'; }}
        >Shop Now</a>
      </div>
    </nav>
  );
}

function HeroSplit({ tweaks }) {
  const heroMap = {
    "Bird Lady": "images/Bluebird_Lady.jpg",
    "Cheetah": "images/Cheetah.jpg",
    "Scarf Lady": "images/Boss_Lady.jpg",
    "Zebra": "images/zebra.jpg",
  };
  const imgSrc = heroMap[tweaks.heroArt] || heroMap["Bird Lady"];
  const dark = tweaks.theme === 'dark';

  return (
    <section data-screen-label="Hero" style={{
      minHeight: '100vh',
      display: 'flex',
      background: dark ? 'oklch(10% 0.02 260)' : 'var(--cream)',
      position: 'relative',
      overflow: 'hidden',
    }}>
      {/* Left: Art */}
      <div style={{
        flex: '0 0 52%',
        position: 'relative',
        overflow: 'hidden',
        animation: 'fadeIn 1s ease both',
      }}>
        <img src={imgSrc} alt={tweaks.heroArt} style={{
          width: '100%', height: '100%',
          objectFit: 'cover',
          objectPosition: 'center top',
          display: 'block',
          animation: 'float 8s ease-in-out infinite',
          transformOrigin: 'center center',
        }} />
        <div style={{
          position: 'absolute', inset: 0,
          background: 'linear-gradient(90deg, transparent 70%, ' + (dark ? 'oklch(10% 0.02 260)' : 'var(--cream)') + ' 100%)',
        }} />
        <div style={{
          position: 'absolute', bottom: 32, left: 32,
          fontFamily: 'var(--sans)', fontSize: 11, letterSpacing: '0.15em',
          textTransform: 'uppercase', color: 'rgba(255,255,255,0.7)',
          background: 'rgba(0,0,0,0.35)', padding: '6px 12px', borderRadius: 2,
        }}>
          {tweaks.heroArt} · Original Acrylic
        </div>
      </div>

      {/* Right: Editorial text */}
      <div style={{
        flex: 1,
        display: 'flex', flexDirection: 'column', justifyContent: 'center',
        padding: '120px 64px 80px 48px',
      }}>
        <div style={{
          fontFamily: 'var(--sans)', fontSize: 11, letterSpacing: '0.2em', textTransform: 'uppercase',
          color: 'var(--gold)', fontWeight: 500, marginBottom: 24,
          animation: 'fadeUp 0.8s 0.2s ease both',
        }}>
          South African Young Artist · Est. 2020
        </div>

        <h1 style={{
          fontFamily: 'var(--serif)',
          fontSize: 'clamp(48px, 5.5vw, 84px)',
          fontWeight: 900, lineHeight: 1.0,
          color: dark ? '#f5f0e8' : 'var(--ink)',
          letterSpacing: '-2px',
          marginBottom: 32,
          animation: 'fadeUp 0.8s 0.35s ease both',
        }}>
          Art born<br />from<br /><em style={{ color: 'var(--cobalt)', fontStyle: 'italic' }}>pure joy.</em>
        </h1>

        <p style={{
          fontFamily: 'var(--sans)', fontSize: 16, lineHeight: 1.75,
          color: dark ? 'rgba(245,240,232,0.7)' : 'var(--ink-mid)',
          maxWidth: 360, marginBottom: 48,
          animation: 'fadeUp 0.8s 0.5s ease both',
        }}>
          Sophia is a 12-year-old South African artist whose vibrant, 
          whimsical work has won the prestigious <strong>Ambassadors Award</strong> at the 
          National Eisteddfod. She started painting at 7. The world noticed at 11.
        </p>

        <div style={{
          display: 'flex', gap: 16, flexWrap: 'wrap',
          animation: 'fadeUp 0.8s 0.65s ease both',
        }}>
          <a href="#gallery" style={{
            background: 'var(--cobalt)', color: 'white',
            padding: '16px 32px', fontFamily: 'var(--sans)', fontWeight: 500,
            fontSize: 13, letterSpacing: '0.08em', textTransform: 'uppercase',
            textDecoration: 'none', borderRadius: 2, transition: 'all .2s',
          }}
            onMouseEnter={e=>e.target.style.background='var(--cobalt-light)'}
            onMouseLeave={e=>e.target.style.background='var(--cobalt)'}
          >View Gallery</a>
          <a href="#sophia" style={{
            border: '1.5px solid ' + (dark ? 'rgba(245,240,232,0.3)' : 'var(--ink-light)'),
            color: dark ? 'rgba(245,240,232,0.8)' : 'var(--ink)',
            padding: '16px 32px', fontFamily: 'var(--sans)', fontWeight: 500,
            fontSize: 13, letterSpacing: '0.08em', textTransform: 'uppercase',
            textDecoration: 'none', borderRadius: 2, transition: 'all .2s',
          }}
            onMouseEnter={e=>{e.target.style.background='var(--cobalt)';e.target.style.color='white';e.target.style.borderColor='var(--cobalt)'}}
            onMouseLeave={e=>{e.target.style.background='transparent';e.target.style.color=dark?'rgba(245,240,232,0.8)':'var(--ink)';e.target.style.borderColor=dark?'rgba(245,240,232,0.3)':'var(--ink-light)'}}
          >Sophia's Story</a>
        </div>

        {/* Awards strip */}
        <div style={{
          marginTop: 64, paddingTop: 32,
          borderTop: '1px solid ' + (dark ? 'rgba(255,255,255,0.1)' : 'var(--cream-mid)'),
          display: 'flex', gap: 32, flexWrap: 'wrap',
          animation: 'fadeUp 0.8s 0.8s ease both',
        }}>
          {[['🏆','Ambassadors Award','National Eisteddfod 2024'],['🎖️','4 Diplomas','National Eisteddfod'],['🎨','Age 7','Started Painting'],['📅','Age 11','First Collection'],].map(([icon,title,sub])=>(
            <div key={title}>
              <div style={{ fontSize: 20, marginBottom: 4 }}>{icon}</div>
              <div style={{ fontFamily:'var(--serif)', fontWeight:700, fontSize:14, color: dark?'#f5f0e8':'var(--ink)' }}>{title}</div>
              <div style={{ fontFamily:'var(--sans)', fontSize:11, color:'var(--ink-mid)', letterSpacing:'0.05em' }}>{sub}</div>
            </div>
          ))}
        </div>
      </div>

      {/* Decorative gold line */}
      <div style={{
        position: 'absolute', top: 0, left: '52%',
        width: 3, height: '100%',
        background: 'linear-gradient(180deg, transparent, var(--gold) 30%, var(--gold) 70%, transparent)',
        opacity: 0.4,
      }} />
    </section>
  );
}

function HeroFullbleed({ tweaks }) {
  const heroMap = {
    "Bird Lady": "images/Bluebird_Lady.jpg",
    "Cheetah": "images/Cheetah.jpg",
    "Scarf Lady": "images/Boss_Lady.jpg",
    "Zebra": "images/zebra.jpg",
    "Pink Giraffe": "images/Pink_Giraffe.jpg",
    "Popcorn Lady": "images/Popcorn_Lady.jpg",
  };
  const imgSrc = heroMap[tweaks.heroArt] || heroMap["Bird Lady"];
  return (
    <section data-screen-label="Hero" style={{ minHeight:'100vh', position:'relative', overflow:'hidden' }}>
      <img src={imgSrc} alt="Hero" style={{ position:'absolute', inset:0, width:'100%', height:'100%', objectFit:'cover', objectPosition:'center top', animation:'float 10s ease-in-out infinite' }} />
      <div style={{ position:'absolute', inset:0, background:'linear-gradient(to right, rgba(0,0,0,0.65) 0%, rgba(0,0,0,0.2) 60%, transparent 100%)' }} />

      <div style={{ position:'relative', zIndex:2, padding:'0 10vw', height:'calc(100vh - 42px)', display:'flex', flexDirection:'column', justifyContent:'center' }}>
        <div style={{ fontFamily:'var(--sans)', fontSize:11, letterSpacing:'0.2em', textTransform:'uppercase', color:'var(--gold)', marginBottom:20, animation:'fadeUp 0.8s ease both' }}>South African Young Artist</div>
        <h1 style={{ fontFamily:'var(--serif)', fontSize:'clamp(56px,7vw,100px)', fontWeight:900, lineHeight:0.95, color:'white', letterSpacing:'-2px', marginBottom:32, animation:'fadeUp 0.8s 0.2s ease both' }}>
          Art born<br />from <em style={{ color:'var(--gold)' }}>joy.</em>
        </h1>
        <p style={{ color:'rgba(255,255,255,0.8)', fontSize:16, maxWidth:420, lineHeight:1.7, marginBottom:40, animation:'fadeUp 0.8s 0.4s ease both' }}>
          Sophia, age 12. Ambassadors Award winner. South Africa's most exciting young artist.
        </p>
        <div style={{ display:'flex', gap:16, animation:'fadeUp 0.8s 0.6s ease both' }}>
          <a href="#gallery" style={{ background:'white', color:'var(--cobalt)', padding:'16px 32px', fontFamily:'var(--sans)', fontWeight:500, fontSize:13, letterSpacing:'0.08em', textTransform:'uppercase', textDecoration:'none', borderRadius:2 }}>View Gallery</a>
          <a href="#sophia" style={{ border:'1.5px solid rgba(255,255,255,0.5)', color:'white', padding:'16px 32px', fontFamily:'var(--sans)', fontWeight:500, fontSize:13, letterSpacing:'0.08em', textTransform:'uppercase', textDecoration:'none', borderRadius:2 }}>Sophia's Story</a>
        </div>
      </div>
      {/* Splash signature mark — bottom-right, like an artist's signature on the canvas */}
      <div style={{
        position:'absolute', bottom: tweaks.showMarquee !== false ? 60 : 32, right: 32,
        zIndex: 3, animation: 'fadeUp 1s 0.9s ease both',
        transform: 'rotate(-4deg)',

function App() {
  const [tweaks, setTweaks] = useState(TWEAK_DEFAULTS);

  useEffect(() => {
    // Register tweaks panel
    window.addEventListener('message', e => {
      if (e.data?.type === '__activate_edit_mode') {
        document.getElementById('tweaks-panel')?.classList.add('open');
      } else if (e.data?.type === '__deactivate_edit_mode') {
        document.getElementById('tweaks-panel')?.classList.remove('open');
      }
    });
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');

    // Helper to render swatches
    function renderSwatches(containerId, options, currentVal, onPick, type) {
      const el = document.getElementById(containerId);
      if (!el) return;
      el.innerHTML = '';
      Object.entries(options).forEach(([key, def]) => {
        const sw = document.createElement('div');
        sw.className = 'swatch' + (key === currentVal ? ' active' : '');
        if (type === 'palette') {
          // Render multi-colour preview
          sw.style.background = `conic-gradient(${def.preview[0]} 0 33%, ${def.preview[1]} 33% 66%, ${def.preview[2]} 66% 100%)`;
        } else if (type === 'marquee') {
          sw.style.background = options[key];
        } else {
          sw.style.background = def.color || def;
        }
        sw.title = def.label || key;
        sw.addEventListener('click', () => onPick(key));
        el.appendChild(sw);
      });
    }

    const apply = (patch) => {
      setTweaks(prev => {
        const next = { ...prev, ...patch };
        // If palette changed, also update accent + marquee
        if (patch.palette && PALETTES[patch.palette]) {
          next.accent = PALETTES[patch.palette].accent;
          next.marquee = PALETTES[patch.palette].marquee;
        }
        window.parent.postMessage({ type: '__edit_mode_set_keys', edits: next }, '*');
        // Re-render swatches with new active state
        renderSwatches('tw-palette', PALETTES, next.palette, v => apply({ palette: v }), 'palette');
        renderSwatches('tw-accent', ACCENTS, next.accent, v => apply({ accent: v }), 'accent');
        renderSwatches('tw-marquee', MARQUEE_COLOURS, next.marquee, v => apply({ marquee: v }), 'marquee');
        return next;
      });
    };

    // Initial render of swatches
    renderSwatches('tw-palette', PALETTES, tweaks.palette, v => apply({ palette: v }), 'palette');
    renderSwatches('tw-accent', ACCENTS, tweaks.accent, v => apply({ accent: v }), 'accent');
    renderSwatches('tw-marquee', MARQUEE_COLOURS, tweaks.marquee, v => apply({ marquee: v }), 'marquee');

    // Selects
    const wireSelect = (id, key) => {
      const el = document.getElementById(id);
      if (!el) return;
      el.value = tweaks[key];
      el.addEventListener('change', () => apply({ [key]: el.value }));
    };
    wireSelect('tw-hero', 'heroArt');
    wireSelect('tw-theme', 'theme');
    wireSelect('tw-layout', 'layout');

    // Toggles
    const wireToggle = (id, key) => {
      const el = document.getElementById(id);
      if (!el) return;
      el.checked = !!tweaks[key];
      el.addEventListener('change', () => apply({ [key]: el.checked }));
    };
    wireToggle('tw-bold', 'bold');
    wireToggle('tw-showMarquee', 'showMarquee');
  }, []);

  const dark = tweaks.theme === 'dark';

  // Apply theme + accent CSS vars
  useEffect(() => {
    const acc = ACCENTS[tweaks.accent] || ACCENTS.pink;
    const mar = MARQUEE_COLOURS[tweaks.marquee] || MARQUEE_COLOURS.pink;
    const r = document.documentElement.style;
    r.setProperty('--accent', acc.color);
    r.setProperty('--accent-light', acc.light);
    r.setProperty('--marquee-bg', mar);
    // Override pink/cobalt vars in bold mode for extra punch
    if (tweaks.bold) {
      r.setProperty('--pink', acc.color);
      r.setProperty('--pink-light', acc.light);
      r.setProperty('--cobalt', '#1a8fe3');
      r.setProperty('--cobalt-light', '#3aa0e6');
      r.setProperty('--gold', '#e8c840');
    } else {
      r.setProperty('--pink', 'oklch(65% 0.24 350)');
      r.setProperty('--pink-light', 'oklch(72% 0.22 350)');
      r.setProperty('--cobalt', 'oklch(38% 0.18 262)');
      r.setProperty('--cobalt-light', 'oklch(52% 0.18 262)');
      r.setProperty('--gold', 'oklch(74% 0.14 76)');
    }
    document.body.style.background = dark ? 'oklch(10% 0.02 260)' : 'var(--cream)';
  }, [tweaks, dark]);

  const HeroComponent = tweaks.layout === 'fullbleed' ? HeroFullbleed : tweaks.layout === 'centered' ? HeroCentered : HeroSplit;

  return (
    <div>
      <Nav tweaks={tweaks} />
      <HeroComponent tweaks={tweaks} />
      <AboutSophia dark={dark} />
      <Gallery dark={dark} />
      <Products dark={dark} />
      <CorporateBand dark={dark} />
      <Footer dark={dark} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
